name: Auto Update Database

on:
  schedule:
    - cron: '0 */2 * * *'
  workflow_dispatch: # מאפשר גם הפעלה ידנית בלחיצת כפתור

jobs:
  update-db:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests
      - name: Run update script
        run: python update_database.py
      - name: Commit and push if changed
        run: |
          git config --global user.name "Auto-Updater"
          git config --global user.email "actions@github.com"
          git add database.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Auto-update database.json" && git push)
